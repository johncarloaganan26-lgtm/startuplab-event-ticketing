<!DOCTYPE html>
<html lang="en" style="margin:0;padding:0;">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{title}}</title>
  <style>
    /* Global Resets */
    body {
      margin: 0;
      padding: 0;
      background-color: #F8FAFC;
      -webkit-font-smoothing: antialiased;
      font-family: 'Inter', 'Helvetica Neue', Helvetica, Arial, sans-serif;
    }

    table {
      border-collapse: collapse;
    }

    .main-card {
      box-shadow: 0 40px 80px rgba(46, 46, 47, 0.05);
    }

    /* Responsive Adjustments */
    @media only screen and (max-width: 600px) {
      .container {
        width: 100% !important;
        padding: 15px !important;
      }

      .side-gutter {
        padding: 40px 30px !important;
      }

      .mobile-text-lg {
        font-size: 32px !important;
      }
    }
  </style>
</head>

<body style="margin:0;padding:0;background-color:#F8FAFC;">
  <table width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:#F8FAFC; min-height:100vh;">
    <tr>
      <td align="center" style="padding: 60px 0;">
        <table class="container" width="520" cellpadding="0" cellspacing="0" border="0"
          style="width:100%; max-width:520px;">

          <!-- BRAND LOGO -->
          <tr>
            <td align="center" style="padding-bottom: 40px;">
              <a href="https://events.moonshotdigital.com.ph/">
                <img
                  src="https://xmjdcbzgdfylbqkjoyyb.supabase.co/storage/v1/object/public/startuplab-business-ticketing/assets/assets/image%20(1).svg"
                  height="110" alt="StartupLab Logo">
              </a>
            </td>
          </tr>

          <!-- NOTIFICATION CARD -->
          <tr>
            <td class="main-card"
              style="background-color: #FFFFFF; border-radius: 40px; border: 1px solid #E2E8F0; overflow: hidden;">
              <table width="100%" cellpadding="0" cellspacing="0" border="0">
                <tr>
                  <td class="side-gutter" style="padding: 50px 50px 45px 50px;">

                    <!-- ICON & TAG -->
                    <div style="margin-bottom: 30px;">
                      <div
                        style="display: inline-block; width: 64px; height: 64px; line-height: 64px; background-color: #F1F5F9; border-radius: 20px; text-align: center; font-size: 32px; margin-bottom: 20px;">
                        {{typeIcon}}
                      </div>
                      <br>
                      <span
                        style="display: inline-block; padding: 8px 14px; background-color: #38BDF2; color: #FFFFFF; font-size: 10px; font-weight: 800; letter-spacing: 0.15em; text-transform: uppercase; border-radius: 10px;">{{tag}}</span>
                    </div>

                    <!-- TITLE -->
                    <h1 class="mobile-text-lg"
                      style="color: #0F172A; font-size: 42px; font-weight: 800; letter-spacing: -0.04em; line-height: 1.1; margin: 0 0 24px 0;">
                      {{title}}</h1>

                    <!-- MESSAGE -->
                    <p style="color: #475569; font-size: 16px; font-weight: 400; line-height: 1.6; margin: 0 0 40px 0;">
                      {{message}}
                    </p>

                    <!-- CTA BUTTON -->
                    <table width="100%" cellpadding="0" cellspacing="0" border="0">
                      <tr>
                        <td align="center">
                          <a href="{{actionUrl}}"
                            style="display: block; width: 100%; padding: 22px 0; background-color: #0F172A; color: #FFFFFF; font-size: 14px; font-weight: 700; text-align: center; text-decoration: none; border-radius: 20px; letter-spacing: 0.1em; box-shadow: 0 20px 40px rgba(15, 23, 42, 0.15);">
                            {{actionLabel}}
                          </a>
                        </td>
                      </tr>
                    </table>

                    <!-- ACTOR / EVENT INFO (IF PROVIDED) -->
                    <table width="100%" cellpadding="0" cellspacing="0" border="0"
                      style="margin-top: 40px; border-top: 1px dashed #E2E8F0; padding-top: 30px;">
                      <tr>
                        <td style="font-size: 13px; color: #64748B;">
                          Sent to you because you're the organizer of <strong>{{eventName}}</strong>.
                        </td>
                      </tr>
                    </table>

                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- FOOTER -->
          <tr>
            <td align="center" style="padding-top: 50px;">
              <div style="opacity: 0.3; margin-bottom: 20px;">
                <img
                  src="https://xmjdcbzgdfylbqkjoyyb.supabase.co/storage/v1/object/public/startuplab-business-ticketing/assets/assets/image%20(1).svg"
                  height="25" alt="StartupLab Footer">
              </div>
              <p style="font-size: 11px; color: #94A3B8; line-height: 1.6;">
                &copy; 2026 StartupLab Business Ticketing. All rights reserved.<br>
                You can manage your notification preferences in your <a
                  href="https://events.moonshotdigital.com.ph/settings"
                  style="color: #38BDF2; text-decoration: none;">Dashboard</a>.
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>

</html>
